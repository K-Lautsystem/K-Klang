<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>K‑Klangalphabet Test</title>
<style>
body { font-family: Arial; padding: 20px; }
input { width: 300px; padding: 5px; }
button { padding: 6px 12px; margin-left: 10px; }
</style>
</head>
<body>

<h2>Deutsch → K‑Laut Zerlegung</h2>
<input id="deutsch" placeholder="habe">
<button onclick="deutschZuK()">Umwandeln</button>

<p><b>K‑Laut Zerlegung:</b> <span id="klaut1"></span></p>

<hr>

<h2>K‑Laut → Koreanische Buchstaben</h2>
<input id="klaut" placeholder="ㅎㅏㄹㄹㅗ">
<button onclick="kZuKo()">Umwandeln</button>

<p><b>Koreanisch:</b> <span id="koreanisch"></span></p>

<script>
// Beispiel-Funktion 1
function deutschZuK() {
    let wort = document.getElementById("deutsch").value;
    document.getElementById("klaut1").innerText = "U-E1V4H2-B1 (Beispiel)";
}

// Beispiel-Funktion 2
function kZuKo() {
    let klaut = document.getElementById("klaut").value;
    document.getElementById("koreanisch").innerText = "할로 (Beispiel)";
}
</script>

</body>
</html>
