<div>
  <h3>Deutsch → K‑Laut → Hangul</h3>
  <input id="inputText" type="text" placeholder="Wort eingeben">
  <button onclick="toK()">Umwandeln</button>
  <div id="output"></div>
</div>

<script>
function composeHangul(jamos) {
  const CHO = "ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ".split('');
  const JUNG = "ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ".split('');
  const JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

  let result = "";
  for (let i = 0; i < jamos.length; ) {
    const cho = jamos[i++];
    const jung = jamos[i++];
    let jong = "";

    if (i < jamos.length) {
      const next = jamos[i];
      if (JONG.includes(next)) {
        jong = next;
        i++;
      }
    }

    const syllable = 0xAC00
      + CHO.indexOf(cho) * 21 * 28
      + JUNG.indexOf(jung) * 28
      + JONG.indexOf(jong);

    result += String.fromCharCode(syllable);
  }
  return result;
}

function toK() {
  const t = document.getElementById("inputText").value.toLowerCase();

  const map = {
    a:"ㅏ", ä:"ㅐ",
    e:"ㅔ",
    i:"ㅣ",
    o:"ㅗ", ö:"ㅚ",
    u:"ㅜ", ü:"ㅠ",

    b:"ㅂ", p:"ㅍ",
    d:"ㄷ", t:"ㅌ",
    g:"ㄱ", k:"ㅋ",
    h:"ㅎ",
    m:"ㅁ",
    n:"ㄴ",
    l:"ㄹ",
    r:"ㄹ",
    s:"ㅅ",
    z:"ㅈ",
    f:"ㅍ",
    v:"ㅂ",
    w:"ㅜ",
    j:"ㅈ",
    y:"ㅣ",
    ß:"ㅆ"
  };

  let jamos = [];
  for (let ch of t) jamos.push(map[ch] || ch);

  const hangul = composeHangul(jamos);

  document.getElementById("output").innerText = hangul;
}
</script>
